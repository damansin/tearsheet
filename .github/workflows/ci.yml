name: CI

# Runs the test suite + the eval accuracy gate on a clean machine every time
# main is updated. Everything here is hermetic: no network, no API keys, no cost.
#
# What the accuracy gate DOES protect:
#   - a broken scorer (tolerance/unit logic) -> same answers score differently
#   - a corrupted benchmark (bad values, deleted facts)
#   - committing worse results after re-running the agent
#
# What it does NOT protect (be honest about this):
#   - an agent change pushed WITHOUT re-running eval/run_agent.py — the committed
#     answers file is then stale, so the gate scores yesterday's results.
#     A true live-agent quality gate needs an API key + network + spend, so it
#     belongs in a manual/nightly tier, not on every push.
#
# Threshold is a RATCHET: set just below the current baseline (57.7%), and raised
# every time the metric improves, so gains get locked in and can't silently slip.

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # the minimum this project claims to support

      - name: Install project + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q

      - name: Eval accuracy gate (scores committed answers — no API calls)
        run: python eval/run_eval.py --answers eval/agent_answers.json --min-accuracy 0.50
