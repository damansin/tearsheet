name: CI

# Runs the test suite on a clean machine every time main is updated.
# Everything here is hermetic: no network, no API keys, no cost.
#
# Not here (on purpose):
#   - running the agent (eval/run_agent.py) — needs a paid API key + live network
#   - eval threshold gating — added in M1, once there is a meaningful
#     accuracy threshold to fail against. A check that cannot fail is not a gate.

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the code
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11" # the minimum this project claims to support

      - name: Install project + dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
